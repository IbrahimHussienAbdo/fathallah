
name: fathallah_analysis
description: Data Processing & Analytics App — Fathallah Gomla Market
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────────────────
  sqflite: ^2.3.3+1             # SQLite for mobile/desktop
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── File Handling ─────────────────────────────────────
  file_picker: ^8.1.6           # Cross-platform file picker
  csv: ^6.0.0                   # CSV parser
  excel: ^4.0.6                 # XLSX parser

  # ── UI & Charts ───────────────────────────────────────
  fl_chart: ^0.69.0             # Charts library
  provider: ^6.1.2              # State management

  # ── Utils ─────────────────────────────────────────────
  intl: ^0.19.0                 # Number/date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
